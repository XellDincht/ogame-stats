<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OGame Empire Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div><p class="eyebrow">OGame Stats · Empire Edition</p><h1 id="playerName">Account Dashboard</h1><p class="subline"><span id="universe">–</span> · Snapshot <span id="latestSnapshot">–</span></p></div>
    <div class="controls"><label>Account <select id="accountSelect"></select></label><label>Tagesstand <select id="snapshotSelect"></select></label><button id="reloadButton">Neu laden</button></div>
  </header>
  <main>
    <section id="message" class="message hidden"></section>
    <section class="summary-grid">
      <article><span>Planeten</span><strong id="planetCount">–</strong></article>
      <article class="metal"><span>Metall / h</span><strong id="totalMetal">–</strong></article>
      <article class="crystal"><span>Kristall / h</span><strong id="totalCrystal">–</strong></article>
      <article class="deut"><span>Deuterium / h</span><strong id="totalDeuterium">–</strong></article>
      <article><span>Schiffe stationiert</span><strong id="stationedShips">–</strong></article>
      <article><span>Schiffe unterwegs</span><strong id="travellingShips">–</strong><small id="travellingHint"></small></article>
      <article><span>Schiffe gesamt</span><strong id="allShips">–</strong></article>
    </section>
    <section class="empire-shell">
      <div class="empire-scroll"><table id="empireTable"><thead id="empireHead"></thead><tbody id="empireBody"></tbody></table></div>
    </section>
  </main>
  <footer>Empire-Collector · lokale SQLite-Snapshots · statischer Export</footer>
  <script src="app.js"></script>
</body>
</html>
