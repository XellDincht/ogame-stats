<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>OGame Allianzstatistik</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Universe Dashboard</p>
      <h1 id="title">OGame Allianzstatistik</h1>
      <p id="subtitle">Statistik wird geladen …</p>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-range="1">Tag</button>
    <button class="tab" data-range="7">Woche</button>
    <button class="tab" data-range="30">30 Tage</button>
    <select id="playerFilter" aria-label="Spieler auswählen">
      <option value="all">Alle Spieler</option>
    </select>
  </nav>

  <main>
    <section id="summary" class="summary-grid"></section>

    <section class="panel">
      <div class="section-head">
        <h2>Gesamtpunkte-Verlauf</h2>
        <span id="rangeLabel" class="muted"></span>
      </div>
      <div class="chart-wrap">
        <canvas id="historyChart" width="1200" height="420"></canvas>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2>Spielerübersicht</h2>
        <input id="search" type="search" placeholder="Spieler suchen …">
      </div>
      <div id="playerCards" class="player-grid"></div>
    </section>

    <section class="panel">
      <div class="section-head"><h2>Detailtabelle</h2></div>
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer id="footer">Wird geladen …</footer>
  <script src="app.js"></script>
</body>
</html>
