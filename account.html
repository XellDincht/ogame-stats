<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#07111f">
    <title>OGame Accountstatistik</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="account.css">
</head>

<body>
    <div id="login" class="account-login">
        <form id="loginForm" class="panel login-card">
            <p class="eyebrow">Geschützter Testbereich</p>
            <h1>Accountstatistik</h1>
            <p class="muted">Dieser Passwortschutz ist nur für die lokale Testphase vorgesehen.</p>
            <input id="password" type="password" autocomplete="current-password" placeholder="Passwort" required>
            <button type="submit">Öffnen</button>
            <p id="loginError" class="negative"></p>
        </form>
    </div>
    <div id="app" hidden>
        <header class="hero">
            <div class="hero-inner">
                <p class="eyebrow">Private Account Intelligence</p>
                <h1 id="accountTitle">Accountstatistik</h1>
                <p id="accountSubtitle">Daten werden geladen …</p>
            </div>
        </header>
        <nav class="toolbar">
            <div class="range-tabs"><a class="nav-link" href="index.html">Allianzstatistik</a>
                <select id="accountPlayer"></select><button id="showAccountStats" class="nav-link account-view-button"
                    type="button">Accountdaten</button><button id="showDashboard" class="nav-link account-view-button"
                    type="button">Dashboard</button>
            </div><button id="logout">Sperren</button>
        </nav>
        <main id="accountMain"></main>
        <section id="dashboardView" class="protected-dashboard" hidden><iframe id="dashboardFrame"
                title="Privates OGame Dashboard" loading="lazy"></iframe></section>
        <footer id="accountFooter"></footer>
    </div>
    <script src="account.js?v=7.6.1"></script>
</body>

</html>
